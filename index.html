<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anu Personal Portal | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rtc-blue: #002d5b;
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --accent: #6366f1;
            --green: #10b981;
            --red: #ef4444;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-color); margin: 0; color: var(--text-main); }
        
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--rtc-blue); flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        #staff-app, #student-app { display: none; padding: 30px; max-width: 1300px; margin: auto; }
        .panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* MODAL */
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 20px; border-radius: 15px; color: white; text-align: center; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-logout { background: #fee2e2; color: #991b1b; }
        
        .search-bar { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #64748b; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .feedback-item { background: #f8fafc; border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .reply-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--rtc-blue)">RTC Portal</h2>
            <input type="text" id="user-input" placeholder="Username">
            <input type="password" id="pass-input" placeholder="Password">
            <button class="btn btn-primary" style="width:100%" onclick="processLogin()">Login</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h2>Control Panel</h2>
                <button class="btn" onclick="toggleSettings(false)">✕ Close</button>
            </div>
            
            <h3>Messages & Replies</h3>
            <div id="feedback-list"></div>
            
            <hr style="margin:25px 0; opacity: 0.1;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <h4>Admin Login</h4>
                    <input type="text" id="new-staff-user" placeholder="Staff Username" style="width:100%; padding:8px; margin-bottom:5px;">
                    <input type="password" id="new-staff-pass" placeholder="Staff Password" style="width:100%; padding:8px; margin-bottom:10px;">
                    <button class="btn btn-primary" style="width:100%" onclick="updateStaffCreds()">Save Credentials</button>
                </div>
                <div>
                    <h4>Danger Zone</h4>
                    <button class="btn btn-danger" style="width:100%" onclick="wipeAllData()">Wipe All System Data</button>
                </div>
            </div>
        </div>
    </div>

    <div id="staff-app">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Staff Dashboard</h1>
            <div>
                <button class="btn" style="background:#e2e8f0" onclick="toggleSettings(true)">⚙️ Settings & Messages</button>
                <button class="btn btn-logout" onclick="location.reload()">Logout</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box" style="background: var(--rtc-blue)"><h4>Total Students</h4><h2 id="s-total">0</h2></div>
            <div class="stat-box" style="background: var(--green)"><h4>Present Today</h4><h2 id="s-present">0</h2></div>
            <div class="stat-box" style="background: var(--red)"><h4>Absent Today</h4><h2 id="s-absent">0</h2></div>
        </div>

        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 20px;">
            <div class="panel">
                <h3 id="form-title">Student Manager</h3>
                <input type="hidden" id="edit-idx">
                <input type="text" id="reg-name" placeholder="Full Name" style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="text" id="reg-dept" placeholder="Department" style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="text" id="reg-pass" placeholder="Password" style="width:100%; margin-bottom:10px; padding:10px;">
                <button id="save-btn" class="btn btn-primary" style="width:100%" onclick="saveStudent()">Save Student</button>
                <hr style="margin:20px 0; opacity:0.1">
                <input type="date" id="att-date" onchange="renderStaffTable()" style="width:100%; padding:10px;">
                <button class="btn" style="background: var(--green); color:white; width:100%; margin-top:10px" onclick="lockDate()">Lock Attendance 🔒</button>
            </div>

            <div class="panel">
                <input type="text" id="staff-search" class="search-bar" placeholder="Search..." onkeyup="renderStaffTable()">
                <div style="max-height: 500px; overflow-y: auto;">
                    <table>
                        <thead><tr><th>Student</th><th>Dept</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="staff-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="student-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 id="welcome-student">Welcome</h1>
            <button class="btn btn-logout" onclick="location.reload()">Logout</button>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="panel">
                <h3>My Stats</h3>
                <div id="student-perc" style="font-size: 48px; font-weight: 800; color: var(--accent);">0%</div>
                <p id="student-details"></p>
                <hr>
                <div id="student-inbox">
                    <h4>Staff Replies:</h4>
                    <div id="reply-container" style="font-size: 14px; color: var(--green);">No replies yet.</div>
                </div>
            </div>
            
            <div class="panel">
                <h3>Send Message to Staff</h3>
                <textarea id="feedback-msg" placeholder="Ask a question..." style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
                <button class="btn btn-primary" style="margin-top:10px; width:100%" onclick="submitFeedback()">Send Message</button>
            </div>
        </div>

        <div class="panel">
            <h3>Attendance History</h3>
            <table>
                <thead><tr><th>Date</th><th>Status</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let staffCreds = JSON.parse(localStorage.getItem('rtc_staff_creds')) || { user: 'staff', pass: '123' };
        let members = JSON.parse(localStorage.getItem('rtc_members')) || [];
        let attendance = JSON.parse(localStorage.getItem('rtc_attendance')) || {};
        let lockedDates = JSON.parse(localStorage.getItem('rtc_locked')) || [];
        let feedback = JSON.parse(localStorage.getItem('rtc_feedback')) || [];
        let loggedInUser = null;

        function processLogin() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === staffCreds.user && p === staffCreds.pass) {
                showView('staff-app');
                document.getElementById('att-date').valueAsDate = new Date();
                renderStaffTable();
            } else {
                const student = members.find(m => m.name === u && m.password === p);
                if (student) {
                    loggedInUser = student;
                    showView('student-app');
                    renderStudentDashboard();
                } else { alert("Invalid Credentials"); }
            }
        }

        // --- STAFF SETTINGS & REPLIES ---
        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
            if(show) renderFeedback();
        }

        function renderFeedback() {
            const container = document.getElementById('feedback-list');
            container.innerHTML = feedback.length ? '' : '<p>No messages.</p>';
            feedback.forEach((f, idx) => {
                container.innerHTML += `
                    <div class="feedback-item">
                        <b>${f.from}</b> <small>(${f.time})</small>: ${f.msg}
                        <div class="reply-box">
                            <input type="text" id="rep-input-${idx}" placeholder="Type reply..." value="${f.reply || ''}" style="width:70%; padding:5px;">
                            <button onclick="sendReply(${idx})" class="btn btn-primary" style="padding:5px 10px; font-size:12px;">Reply</button>
                            <button onclick="deleteFeedback(${idx})" style="color:red; background:none; border:none; cursor:pointer; font-size:12px;">Delete</button>
                        </div>
                    </div>`;
            });
        }

        function sendReply(idx) {
            const val = document.getElementById(`rep-input-${idx}`).value;
            feedback[idx].reply = val;
            localStorage.setItem('rtc_feedback', JSON.stringify(feedback));
            alert("Reply saved!");
        }

        function deleteFeedback(idx) {
            feedback.splice(idx, 1);
            localStorage.setItem('rtc_feedback', JSON.stringify(feedback));
            renderFeedback();
        }

        function updateStaffCreds() {
            staffCreds.user = document.getElementById('new-staff-user').value;
            staffCreds.pass = document.getElementById('new-staff-pass').value;
            localStorage.setItem('rtc_staff_creds', JSON.stringify(staffCreds));
            alert("Credentials Updated");
        }

        function wipeAllData() { if(confirm("Erase all?")) { localStorage.clear(); location.reload(); } }

        // --- STUDENT DASHBOARD ---
        function submitFeedback() {
            const msg = document.getElementById('feedback-msg').value;
            if(!msg) return;
            feedback.push({ from: loggedInUser.name, msg, time: new Date().toLocaleDateString(), reply: "" });
            localStorage.setItem('rtc_feedback', JSON.stringify(feedback));
            document.getElementById('feedback-msg').value = '';
            alert("Sent!");
        }

        function renderStudentDashboard() {
            document.getElementById('welcome-student').innerText = `Welcome, ${loggedInUser.name}`;
            document.getElementById('student-details').innerText = `Dept: ${loggedInUser.dept}`;
            
            // Check for replies
            const myReplies = feedback.filter(f => f.from === loggedInUser.name && f.reply);
            const container = document.getElementById('reply-container');
            container.innerHTML = myReplies.length ? '' : 'No replies yet.';
            myReplies.forEach(r => {
                container.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee;"><b>You asked:</b> ${r.msg}<br><b>Staff:</b> ${r.reply}</div>`;
            });

            let pCount = 0;
            const hBody = document.getElementById('history-body');
            hBody.innerHTML = '';
            lockedDates.forEach(date => {
                const status = (attendance[date] && attendance[date][loggedInUser.name]) || 'Present';
                if(status === 'Present') pCount++;
                hBody.innerHTML += `<tr><td>${date}</td><td>${status}</td></tr>`;
            });
            const perc = lockedDates.length > 0 ? Math.round((pCount / lockedDates.length) * 100) : 0;
            document.getElementById('student-perc').innerText = perc + "%";
        }

        // --- CORE UI LOGIC ---
        function showView(id) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        function saveStudent() {
            const n = document.getElementById('reg-name').value;
            const d = document.getElementById('reg-dept').value;
            const p = document.getElementById('reg-pass').value;
            const idx = document.getElementById('edit-idx').value;
            if(!n || !p) return alert("Required fields missing");
            if(idx === "") members.push({ name: n, dept: d, password: p });
            else members[idx] = { name: n, dept: d, password: p };
            localStorage.setItem('rtc_members', JSON.stringify(members));
            location.reload(); 
        }

        function editStudent(idx) {
            const m = members[idx];
            document.getElementById('reg-name').value = m.name;
            document.getElementById('reg-dept').value = m.dept;
            document.getElementById('reg-pass').value = m.password;
            document.getElementById('edit-idx').value = idx;
            document.getElementById('form-title').innerText = "Edit mode";
        }

        function renderStaffTable() {
            const date = document.getElementById('att-date').value;
            const query = document.getElementById('staff-search').value.toLowerCase();
            const tbody = document.getElementById('staff-table-body');
            const isLocked = lockedDates.includes(date);
            tbody.innerHTML = '';
            let p = 0, a = 0;
            members.forEach((m, idx) => {
                const status = (attendance[date] && attendance[date][m.name]) || 'Present';
                if(status === 'Present') p++; else a++;
                if(m.name.toLowerCase().includes(query)) {
                    tbody.innerHTML += `<tr>
                        <td><b>${m.name}</b></td>
                        <td>${m.dept}</td>
                        <td><button class="btn" style="background:${status === 'Present' ? '#dcfce7':'#fee2e2'}" onclick="${isLocked ? 'alert(\'Locked\')' : `toggleAtt('${date}','${m.name}')`}">${status}</button></td>
                        <td><button onclick="editStudent(${idx})">✏️</button> <button onclick="removeMem(${idx})">🗑️</button></td>
                    </tr>`;
                }
            });
            document.getElementById('s-total').innerText = members.length;
            document.getElementById('s-present').innerText = p;
            document.getElementById('s-absent').innerText = a;
        }

        function toggleAtt(date, name) {
            if(!attendance[date]) attendance[date] = {};
            attendance[date][name] = (attendance[date][name] === 'Absent') ? 'Present' : 'Absent';
            localStorage.setItem('rtc_attendance', JSON.stringify(attendance));
            renderStaffTable();
        }

        function lockDate() {
            const date = document.getElementById('att-date').value;
            if(!lockedDates.includes(date)) {
                lockedDates.push(date);
                localStorage.setItem('rtc_locked', JSON.stringify(lockedDates));
                alert("Date Locked");
                renderStaffTable();
            }
        }

        function removeMem(idx) {
            if(confirm("Delete student?")) {
                members.splice(idx, 1);
                localStorage.setItem('rtc_members', JSON.stringify(members));
                renderStaffTable();
            }
        }
    </script>
</body>
</html>
